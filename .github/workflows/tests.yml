name: Tests (offline self-test + E2E)

# Runs the quality gate on every push / PR to main. Everything here is offline
# and deterministic (no network), so it is safe to run in CI.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps (runtime + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Static registry validation
        run: python cli.py validate
      - name: Offline self-test (pipeline)
        run: python selftest.py
      - name: E2E / scenario tests (offline, deterministic)
        run: python -m pytest tests/ -q
