    fetch_method: rss
    update_freq: daily
    license_note: "Headline + summary + source link only; (c) Herald Corp"
    trust: high

  - id: kr-yonhap
    name: Yonhap News Agency (English)
    source_type: media
    url: https://en.yna.co.kr/RSS/news.xml
    site: https://en.yna.co.kr/
