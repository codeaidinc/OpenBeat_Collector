# OpenBeat Collector — Source Registry (South Korea)
# fetch_method: rss | html | api | manual
# source_type: government | ministry | media | sme_media | support_org | statistics
country: South Korea
language_default: en
sources:
  - id: kr-govt-news-business
    name: "Korea.net (KOCIS) — News Focus: Business"
    source_type: government
    url: https://www.korea.net/koreanet/rss/news/4
    site: https://www.korea.net/NewsFocus/Business
    lang: en
    fetch_method: rss
    update_freq: daily
    license_note: "Headline + summary + source link only; (c) KOCIS"
    trust: high

  - id: kr-motie
    name: Ministry of Trade, Industry and Energy (MOTIE) — Press Releases (English)
    source_type: ministry
    url: https://english.motie.go.kr/en/pc/pressreleases/bbs/bbsList.do?bbs_cd_n=2
    site: https://english.motie.go.kr/eng/
    lang: en
    fetch_method: manual
    update_freq: weekly
    license_note: "Government public release; bot/JS gated, so manual paste (summary + source link)."
    trust: high

  - id: kr-bok
    name: Bank of Korea — Press Releases (English)
    source_type: government
    url: https://www.bok.or.kr/eng/singl/newsDataEng/list.do?menuNo=400423
