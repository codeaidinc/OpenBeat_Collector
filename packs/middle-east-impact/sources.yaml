# Source Registry — Middle East Impact (SME) pack
# Public sources that SMEs routinely watch, focused on the impact channels of
# the Middle East situation: energy, supply chain / trade, prices.
# Balanced: domestic ministries + international bodies + major media (neutrality).
# fetch_method: rss | html | api | manual | dataset
# source_type: government | ministry | media | sme_media | support_org | statistics
country: International
language_default: en
sources:
  # --- Energy / trade / industry (Japan ministries) ---
  - id: mei-meti
    name: METI (Ministry of Economy, Trade and Industry) — News Releases
    country: Japan
    source_type: ministry
    url: https://www.meti.go.jp/ml_index_release_atom.xml
    site: https://www.meti.go.jp/press/index.html
    lang: ja
    fetch_method: rss
    update_freq: daily
    license_note: "Japan Government Standard Terms of Use. Energy / trade / supply chain. Summary + source link only."
    trust: high

  - id: mei-enecho
    name: Agency for Natural Resources and Energy (ENECHO) — News Releases
    country: Japan
    source_type: ministry
    url: https://www.enecho.meti.go.jp/notice/news_release/
    site: https://www.enecho.meti.go.jp/notice/
    lang: ja
    fetch_method: manual
    update_freq: weekly
    license_note: "Japan Government Standard Terms of Use. Crude / LNG / fuel / electricity. The listing page is slow to fetch (read timeout) for the scraper, so manual paste; or switch back to html if your network fetches it reliably. Summary + source link only."
    trust: high

  - id: mei-chusho
    name: Japan SME Agency (Chusho Kigyo Cho) — News
    country: Japan
    source_type: ministry
    url: https://www.chusho.meti.go.jp/rss/index.xml
    site: https://www.chusho.meti.go.jp/
    lang: ja
    fetch_method: rss
    update_freq: daily
    license_note: "Japan Government Standard Terms of Use. SME support measures. Summary + source link only."
    trust: high

  # --- Trade / overseas business (SME-facing support org) ---
  - id: mei-jetro
    name: JETRO — Business Brief
    country: Japan
    source_type: support_org
    url: https://www.jetro.go.jp/rss/biznews.xml
    site: https://www.jetro.go.jp/biznews/
    lang: ja
    fetch_method: rss
    update_freq: daily
    license_note: "Overseas business / trade / procurement news. Summary + source link only."
    trust: high

  # --- Price / inflation transmission (statistics) ---
  - id: mei-boj-cgpi
    name: Bank of Japan — Corporate Goods Price Index (CGPI) releases
    country: Japan
    source_type: statistics
    url: https://www.boj.or.jp/statistics/pi/cgpi_release/index.htm
    site: https://www.boj.or.jp/statistics/pi/index.htm
    lang: ja
    fetch_method: html
    update_freq: monthly
    license_note: "Bank of Japan terms of use. Producer-price pass-through. Summary + source link only (figures detailed in linked monthly PDFs)."
    trust: high

  # --- International energy body ---
  - id: mei-iea
    name: IEA (International Energy Agency) — News
    country: International
    source_type: government
    url: https://www.iea.org/news
    site: https://www.iea.org/news
    lang: en
    fetch_method: manual
    update_freq: weekly
    license_note: "International body. Site returns HTTP 403 to automated fetches (bot-blocked), so manual paste: summary + source link only."
    trust: high

  # --- Middle East situation context (UN / humanitarian, neutral) ---
  - id: mei-reliefweb
    name: ReliefWeb (UN OCHA) — Updates
    country: International
    source_type: support_org
    url: https://reliefweb.int/updates/rss.xml
    site: https://reliefweb.int/updates
    lang: en
    fetch_method: rss
    update_freq: hourly
    license_note: "UN OCHA humanitarian information. Theme keywords narrow to Middle East items. Summary + source link only."
    trust: high

  # --- Major international media (markets / energy / shipping) ---
  - id: mei-bbc-business
    name: BBC News — Business
    country: UK
    source_type: media
    url: https://feeds.bbci.co.uk/news/business/rss.xml
    site: https://www.bbc.co.uk/news/business
    lang: en
    fetch_method: rss
    update_freq: hourly
    license_note: "Headline + summary + source link only. No full-text reproduction."
    trust: medium
