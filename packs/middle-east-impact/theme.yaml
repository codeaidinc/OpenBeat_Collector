# Theme: Middle East Impact on SMEs (collection-side keyword filter)
# Purpose: simple en/ja text-match keywords to narrow collection to
#   Middle East situation + its business-impact channels (energy, maritime
#   logistics, supply chain / procurement, price / inflation).
# Note: this is NOT a classification tag — it is a naive text-match filter on
#   the collection side. Some misses / over-collection are expected.
#   Fine-grained classification is handled by the closed layer.
# Japanese keywords are kept on purpose so the filter matches Japanese sources.
id: middle-east-impact
name: Middle East Impact (SME)
keywords:
  # --- Middle East situation (geography / actors) ---
  - Middle East
  - Gaza
  - Israel
  - Iran
  - Hormuz
  - Strait of Hormuz
  - Red Sea
  - Houthi
  - Suez
  - Suez Canal
  - sanctions
  # --- Energy (crude / LNG / fuel) ---
  - oil price
  - crude oil
  - LNG
  - natural gas
  - energy price
  - fuel price
  - gasoline
  - electricity price
  # --- Maritime logistics / shipping ---
  - shipping
  - freight
  - freight rate
  - container
  - marine insurance
  - war risk insurance
  - rerouting
  # --- Supply chain / procurement ---
  - supply chain
  - procurement
  - parts shortage
  - lead time
  - alternative sourcing
  - import
  # --- Price / inflation / FX ---
  - inflation
  - cost pass-through
  - producer price
  - exchange rate
  - yen depreciation
  # --- 日本語：中東情勢 ---
  - 中東
  - イスラエル
  - イラン
  - ガザ
  - ホルムズ
  - ホルムズ海峡
  - 紅海
  - スエズ
  - スエズ運河
  - 制裁
  # --- 日本語：エネルギー ---
