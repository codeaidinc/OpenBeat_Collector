name: Middle East Impact (SME)
name_ja: 中東情勢の影響（中小企業）
domain: Geopolitics x SMEs — how the Middle East situation affects small businesses (energy, supply chain, prices)
domain_ja: 地政学×中小企業（中東情勢が中小企業に与える影響：エネルギー・サプライチェーン・価格）
description: >-
  Routine monitoring of public information on how the Middle East situation
  affects small and mid-sized businesses: energy (crude / LNG / fuel),
  maritime logistics (Hormuz / Red Sea / Suez), supply chain & procurement,
  and price / inflation pass-through. Sources are official ministries,
  international bodies, and major media — collected with provenance for
  neutral, source-cited reporting.
description_ja: >-
  中東情勢が中小企業に与える「影響」を、公開情報から出典付きで定点観測するパック。
  エネルギー（原油・LNG・燃料）、海上物流（ホルムズ・紅海・スエズ）、サプライチェーン・調達、
  価格・インフレ（コスト転嫁・為替）を主軸に、省庁・国際機関・主要メディアの公開情報を
  来歴付きで収集します。中立・出典付きの報道を支えます。
